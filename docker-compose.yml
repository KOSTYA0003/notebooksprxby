services:
  # PHP-FPM приложение
  laptop-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laptop-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - laptop-network

  # Веб-сервер Nginx
  laptop-web:
    image: nginx:stable-alpine
    container_name: laptop-web
    restart: unless-stopped
    ports:
      - "8084:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laptop-app
    networks:
      - laptop-network

  # База данных MySQL
  laptop-db:
    image: mysql:8.0
    container_name: laptop-db
    restart: always
    environment:
      MYSQL_DATABASE: laptop_parser
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - laptop_db_data:/var/lib/mysql
    networks:
      - laptop-network

  # phpMyAdmin для удобства
  laptop-pma:
    image: phpmyadmin
    container_name: laptop-pma
    links:
      - laptop-db:db
    ports:
      - "8085:80"
    environment:
      - PMA_HOST=laptop-db
      - PMA_USER=root
      - PMA_PASSWORD=root
    networks:
      - laptop-network

networks:
  laptop-network:
    driver: bridge

volumes:
  laptop_db_data:
